services:
  dashboard-web:
    build:
      context: ../../../apps
      dockerfile: dashboard-web/Dockerfile
      args:
        VITE_HA_URL: "http://${LINOS_HOST_IP}:${HA_PORT}"
        VITE_HA_TOKEN: "${LINOS_HA_TOKEN}"
        VITE_API_BASE: "http://${LINOS_HOST_IP}:${DASHBOARD_API_PORT:-4001}"
    restart: unless-stopped
    networks:
      - dashboard-net
    ports:
      - "${DASHBOARD_WEB_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard-api:
    build:
      context: ../../../apps
      dockerfile: dashboard-api/Dockerfile
    env_file:
      - ../../../.env.linos
    environment:
      PORT: ${DASHBOARD_API_PORT:-4001}
      NODE_ENV: production
      SERVICES_CONFIG_PATH: /app/config/services.json   # ← Pfad IM Container
      DASHBOARD_CONFIG_PATH: /app/config/dashboard.json
    volumes:
      - ../../../config/services.json:/app/config/services.json:ro   # ← Mount
      - ../../../config/dashboard.json:/app/config/dashboard.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../../:/host-repo
      - /home/linus/.ssh/linos_git_pull:/run/secrets/linos_git_pull_key:ro
    restart: unless-stopped
    networks:
      - dashboard-net
    ports:
      - "${DASHBOARD_API_PORT:-4001}:4001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    group_add:
      - "${DOCKER_GID:-968}"

networks:
  dashboard-net:
    driver: bridge
