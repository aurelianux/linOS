services:
  dashboard-web:
    build:
      context: ../../..
      dockerfile: apps/dashboard-web/Dockerfile
    restart: unless-stopped
    ports:
      - "${DASHBOARD_WEB_PORT:-4000}:4000"

  dashboard-api:
    build:
      context: ../../..
      dockerfile: apps/dashboard-api/Dockerfile
    env_file:
      - ../../.env.linos
    environment:
      PORT: ${DASHBOARD_API_PORT:-4001}
      NODE_ENV: production
    restart: unless-stopped
    ports:
      - "${DASHBOARD_API_PORT:-4001}:4001"

