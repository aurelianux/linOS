<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>linOS – Service Index</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --bg-card: #0b1020;
      --accent: #4ade80;
      --accent-soft: #22c55e33;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --border: #1f2933;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827, #020617 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .shell {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(145deg, rgba(15,23,42,0.96), rgba(2,6,23,0.98));
      border-radius: 1.4rem;
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow:
        0 40px 80px rgba(15,23,42,0.8),
        0 0 0 1px rgba(15,23,42,0.9);
      padding: 1.5rem 1.8rem 1.8rem;
      backdrop-filter: blur(18px);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .title-block h1 {
      margin: 0;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .badge {
      font-size: .7rem;
      padding: .15rem .5rem;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .subtitle {
      margin-top: .25rem;
      font-size: .9rem;
      color: var(--text-muted);
    }
    .search-block {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      min-width: 220px;
    }
    .search-block label {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
    }
    .search-input {
      position: relative;
    }
    .search-input input {
      width: 100%;
      padding: .5rem .75rem .5rem 2.1rem;
      border-radius: .8rem;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(15,23,42,0.9);
      color: var(--text);
      font-size: .85rem;
      outline: none;
    }
    .search-input span {
      position: absolute;
      left: .65rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: .8rem;
      color: var(--text-muted);
    }
    main {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .group {
      border-radius: 1rem;
      border: 1px solid rgba(31,41,55,0.9);
      padding: .9rem 1rem 1rem;
      background: radial-gradient(circle at top left, rgba(56,189,248,0.07), transparent 55%);
    }
    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .7rem;
    }
    .group-title {
      font-size: .95rem;
      font-weight: 600;
    }
    .group-count {
      font-size: .75rem;
      color: var(--text-muted);
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: .6rem;
    }
    .card {
      position: relative;
      padding: .75rem .8rem .9rem;
      border-radius: .9rem;
      border: 1px solid var(--border);
      background: rgba(9,12,23,0.96);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color .16s ease, transform .14s ease, box-shadow .14s ease, background .18s ease;
    }
    .card:hover {
      border-color: rgba(74,222,128,0.9);
      box-shadow: 0 0 0 1px rgba(74,222,128,0.35), 0 12px 22px rgba(15,23,42,0.9);
      transform: translateY(-1px);
      background: radial-gradient(circle at top, rgba(22,163,74,0.18), rgba(9,9,18,0.97));
    }
    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      margin-bottom: .3rem;
    }
    .card-title {
      font-size: .9rem;
      font-weight: 600;
    }
    .card-tag {
      font-size: .65rem;
      padding: .12rem .45rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .07em;
      white-space: nowrap;
    }
    .card-desc {
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: .35rem;
    }
    .card-url {
      font-size: .75rem;
      color: rgba(148,163,184,0.95);
      display: flex;
      align-items: center;
      gap: .3rem;
      opacity: .95;
    }
    .card-url span {
      font-size: .9rem;
    }
    .footer {
      margin-top: 1.4rem;
      font-size: .75rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .pill-row {
      display: flex;
      gap: .2rem;
      flex-wrap: wrap;
    }
    .pill {
      padding: .1rem .45rem;
      border-radius: 999px;
      border: 1px solid rgba(55,65,81,0.9);
      font-size: .7rem;
    }
    @media (max-width: 720px) {
      header {
        flex-direction: column;
      }
      .search-block {
        width: 100%;
      }
      body {
        padding: 1.2rem .7rem;
      }
      .shell {
        padding: 1.1rem 1.2rem 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="title-block">
        <div class="badge">linOS · manny</div>
        <h1>Service Index<span style="font-size:1.15rem;color:var(--accent)">●</span></h1>
        <div class="subtitle" id="subtitle">Lade Dienste…</div>
      </div>
      <div class="search-block">
        <label for="search">Filter</label>
        <div class="search-input">
          <span>🔍</span>
          <input id="search" type="text" placeholder="Nach Dienst oder URL suchen…" autocomplete="off" />
        </div>
      </div>
    </header>

    <main id="groups"></main>

    <div class="footer">
      <div>Tip: Lege dir <code>manny.lan</code> als Startseite auf deinen Browser / Tablet.</div>
      <div class="pill-row">
        <span class="pill">linOS</span>
        <span class="pill">Home Assistant</span>
        <span class="pill">Zigbee2MQTT</span>
        <span class="pill">Node-RED</span>
        <span class="pill">AdGuard</span>
      </div>
    </div>
  </div>

  <script>
    const groupsEl = document.getElementById('groups');
    const searchEl = document.getElementById('search');
    const subtitleEl = document.getElementById('subtitle');
    let state = { groups: [] };

    function render(filterText = "") {
      const q = filterText.trim().toLowerCase();
      groupsEl.innerHTML = "";

      state.groups.forEach(group => {
        const filtered = group.services.filter(s => {
          if (!q) return true;
          return (
            s.name.toLowerCase().includes(q) ||
            (s.url && s.url.toLowerCase().includes(q)) ||
            (s.description && s.description.toLowerCase().includes(q))
          );
        });
        if (!filtered.length) return;

        const groupEl = document.createElement('section');
        groupEl.className = 'group';

        const headerEl = document.createElement('div');
        headerEl.className = 'group-header';

        const titleEl = document.createElement('div');
        titleEl.className = 'group-title';
        titleEl.textContent = group.name;

        const countEl = document.createElement('div');
        countEl.className = 'group-count';
        countEl.textContent = filtered.length + " Dienste";

        headerEl.appendChild(titleEl);
        headerEl.appendChild(countEl);

        const gridEl = document.createElement('div');
        gridEl.className = 'services-grid';

        filtered.forEach(service => {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = service.url || '#';
          a.target = '_blank';
          a.rel = 'noreferrer';

          const titleRow = document.createElement('div');
          titleRow.className = 'card-title-row';

          const title = document.createElement('div');
          title.className = 'card-title';
          title.textContent = service.name;

          const tag = document.createElement('div');
          tag.className = 'card-tag';
          tag.textContent = group.name;

          titleRow.appendChild(title);
          titleRow.appendChild(tag);

          const desc = document.createElement('div');
          desc.className = 'card-desc';
          desc.textContent = service.description || "";

          const urlRow = document.createElement('div');
          urlRow.className = 'card-url';
          const urlText = document.createElement('span');
          const url = service.url || "";
          urlText.textContent = url.replace(/^https?:\/\//, '');
          urlRow.innerHTML = "↗ ";
          urlRow.appendChild(urlText);

          a.appendChild(titleRow);
          a.appendChild(desc);
          a.appendChild(urlRow);

          gridEl.appendChild(a);
        });

        groupEl.appendChild(headerEl);
        groupEl.appendChild(gridEl);
        groupsEl.appendChild(groupEl);
      });

      if (!groupsEl.children.length) {
        groupsEl.innerHTML = '<p style="color:#9ca3af;font-size:.85rem;">Keine Dienste gefunden, Filter anpassen.</p>';
      }
    }

    fetch('services.json')
      .then(r => r.json())
      .then(data => {
        state.groups = data.groups || [];
        if (data.subtitle) subtitleEl.textContent = data.subtitle;
        render();
      })
      .catch(err => {
        console.error('Fehler beim Laden von services.json:', err);
        subtitleEl.textContent = 'Fehler beim Laden der Dienste.';
        groupsEl.innerHTML = '<p style="color:#f97373;font-size:.85rem;">services.json konnte nicht geladen werden.</p>';
      });

    searchEl.addEventListener('input', (e) => {
      render(e.target.value);
    });
  </script>
</body>
</html>
