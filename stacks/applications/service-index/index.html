<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Manny · Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #05060a;
      --card: #111827;
      --card-hover: #1f2937;
      --border: #374151;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a 0, #020617 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      max-width: 960px;
      width: 100%;
    }
    header {
      margin-bottom: 20px;
      text-align: left;
    }
    header h1 {
      font-size: 1.9rem;
      margin-bottom: 4px;
    }
    header p {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
      transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, border-color 0.12s ease-out, background 0.12s ease-out;
    }
    .card:hover {
      transform: translateY(-3px);
      background: var(--card-hover);
      border-color: var(--accent);
      box-shadow: 0 24px 60px rgba(8, 47, 73, 0.65);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2px;
    }
    .icon {
      font-size: 1.4rem;
    }
    .name {
      font-size: 1rem;
      font-weight: 600;
    }
    .tag {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .link {
      margin-top: 4px;
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .link a:hover {
      text-decoration: underline;
    }
    .url {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 60%;
      text-align: right;
    }
    footer {
      margin-top: 12px;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Manny · Service Übersicht</h1>
      <p>Direktlinks zu deinen wichtigsten Diensten auf diesem Host.</p>
    </header>

    <div class="grid" id="services"></div>

    <footer>
      Host: <span id="host"></span> · Ports anpassbar über <code>index.html</code>.
    </footer>
  </div>

  <script>
    const host = window.location.hostname || "192.168.2.31";

    const services = [
      {
        name: "Home Assistant",
        icon: "🏠",
        tag: "Smart Home Zentrale",
        port: 8123,
        path: "/",
        desc: "Alle Geräte, Szenen und Automationen."
      },
      {
        name: "Node-RED",
        icon: "🧠",
        tag: "Flows & Logik",
        port: 1880,
        path: "/",
        desc: "Komplexe Automationen und Integrationen."
      },
      {
        name: "AdGuard Home",
        icon: "🛡️",
        tag: "DNS & Filter",
        port: 3000,
        path: "/",
        desc: "Werbeblocker / DNS-Filter für dein Netz."
      },
      {
        name: "Plane",
        icon: "📋",
        tag: "Projektmanagement",
        port: 8080,
        path: "/",
        desc: "Epics, Backlog und Sprints (falls angebunden)."
      },
      {
        name: "MinIO",
        icon: "🗄️",
        tag: "Storage UI",
        port: 9090,
        path: "/",
        desc: "S3-kompatibler Storage (UI, wenn Port gemappt)."
      },{name: "Zigbee", icon: ":)", tag: "Infra", port: 8082, path: "/", desc: "Zigbee2MQTT connector für Zigbee Geräte"}
    ];

    const container = document.getElementById("services");
    document.getElementById("host").textContent = host;

    services.forEach(s => {
      const url = `http://${host}:${s.port}${s.path}`;
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <div class="card-header">
          <div class="icon">${s.icon}</div>
          <div>
            <div class="name">${s.name}</div>
            <div class="tag">${s.tag}</div>
          </div>
        </div>
        <div class="desc">${s.desc}</div>
        <div class="link">
          <a href="${url}" target="_blank" rel="noopener noreferrer">Öffnen →</a>
          <span class="url">${url}</span>
        </div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
EOF
