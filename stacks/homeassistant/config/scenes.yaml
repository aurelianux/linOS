# scenes.yaml

# Farb-Referenz (nur Kommentar, zur Orientierung):
# WW       → color_temp: 380
# hOrange  → hs_color: [25, 70]
# dOrange  → hs_color: [25, 90]
# lBlau    → hs_color: [210, 25]
# dBlau    → hs_color: [210, 60]

# ───── Wohnzimmer ──────────────────────────────────────────────

- id: sz_wohnzimmer_aus
  name: Wohnzimmer Aus
  entities:
    light.bidschirm:
      state: 'off'
    light.klavier:
      state: 'off'
    light.links:
      state: 'off'
    light.rechts:
      state: 'off'
    light.notenschlussel:
      state: 'off'

- id: sz_wohnzimmer_chill
  name: Wohnzimmer Chill
  entities:
    light.bidschirm:
      state: 'on'
      brightness_pct: 20
      hs_color:
        - 25   # hOrange
        - 70
    light.links:
      state: 'on'
      brightness_pct: 10
      color_temp: 380   # WW
    light.rechts:
      state: 'on'
      brightness_pct: 10
      color_temp: 380
    light.notenschlussel:
      state: 'on'
      brightness_pct: 10
      color_temp: 380
    light.klavier:
      state: 'off'

- id: sz_wohnzimmer_hell
  name: Wohnzimmer Hell
  entities:
    light.bidschirm:
      state: 'on'
      brightness_pct: 70
      color_temp: 380   # WW
    light.links:
      state: 'on'
      brightness_pct: 70
      color_temp: 380
    light.rechts:
      state: 'on'
      brightness_pct: 70
      color_temp: 380
    light.notenschlussel:
      state: 'on'
      brightness_pct: 50
      hs_color:
        - 210  # lBlau
        - 25
    light.klavier:
      state: 'on'
      brightness_pct: 60
      color_temp: 380

