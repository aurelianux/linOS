###############################################################################
# LINOS / Wohnung – zentraler HomeAssistant Package
###############################################################################

########################################
# HELPERS (linBoard Lighting Modes)
########################################
input_select:
  lighting_mode:
    name: Lichtmodus
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-multiple

  lighting_mode_wohnzimmer:
    name: Lichtmodus Wohnzimmer
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-group

  lighting_mode_kueche:
    name: Lichtmodus Küche
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-group

  lighting_mode_schlafzimmer:
    name: Lichtmodus Schlafzimmer
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-group

  lighting_mode_flur:
    name: Lichtmodus Flur
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-group


########################################
# SCENES
########################################
# YAML-Anchors als Constants (beim ersten Vorkommen definiert):
#
#   Farben:
#     &ct_warmweiss 370        warm white (color_temp in mireds)
#     &hs_orange [30, 90]      bright orange (hs_color [hue, sat])
#
#   Helligkeit Chill:
#     &br_chill_accent 2       links, rechts, nachttisch
#     &br_chill_ambient 10     kuche, notenschlussel, flur
#     &br_chill_bildschirm 13  bildschirm
#
#   Helligkeit Hell:
#     &br_hell_main 60         links, rechts, nachttisch
#     &br_hell_bright 70       bildschirm, flur
#     &br_hell_accent 80       kuche, notenschlussel
########################################
scene:
  # ── Wohnzimmer ─────────────────────
  - id: sz_wohnzimmer_chill
    name: Wohnzimmer Chill
    entities:
      light.bidschirm:
        state: "on"
        brightness_pct: &br_chill_bildschirm 13
        color_temp: &ct_warmweiss 370
      light.links:
        state: "on"
        brightness_pct: &br_chill_accent 2
        hs_color: &hs_orange [30, 90]
      light.rechts:
        state: "on"
        brightness_pct: *br_chill_accent
        hs_color: *hs_orange
      light.notenschlussel:
        state: "on"
        brightness_pct: &br_chill_ambient 10
        color_temp: *ct_warmweiss

  - id: sz_wohnzimmer_hell
    name: Wohnzimmer Hell
    entities:
      light.bidschirm:
        state: "on"
        brightness_pct: &br_hell_bright 70
        color_temp: *ct_warmweiss
      light.links:
        state: "on"
        brightness_pct: &br_hell_main 60
        color_temp: *ct_warmweiss
      light.rechts:
        state: "on"
        brightness_pct: *br_hell_main
        color_temp: *ct_warmweiss
      light.notenschlussel:
        state: "on"
        brightness_pct: &br_hell_accent 80
        color_temp: *ct_warmweiss

  - id: sz_wohnzimmer_aus
    name: Wohnzimmer Aus
    entities:
      light.bidschirm:
        state: "off"
      light.links:
        state: "off"
      light.rechts:
        state: "off"
      light.notenschlussel:
        state: "off"

  # ── Küche ──────────────────────────
  - id: sz_kuche_aus
    name: Küche Aus
    entities:
      light.kuche:
        state: "off"

  - id: sz_kuche_chill
    name: Küche Chill
    entities:
      light.kuche:
        state: "on"
        brightness_pct: *br_chill_ambient
        color_temp: *ct_warmweiss

  - id: sz_kuche_hell
    name: Küche Hell
    entities:
      light.kuche:
        state: "on"
        brightness_pct: *br_hell_accent
        color_temp: *ct_warmweiss

  # ── Flur ───────────────────────────
  - id: sz_flur_aus
    name: Flur Aus
    entities:
      light.flur:
        state: "off"

  - id: sz_flur_chill
    name: Flur Chill
    entities:
      light.flur:
        state: "on"
        brightness_pct: *br_chill_ambient
        color_temp: *ct_warmweiss

  - id: sz_flur_hell
    name: Flur Hell
    entities:
      light.flur:
        state: "on"
        brightness_pct: *br_hell_bright
        color_temp: *ct_warmweiss

  # ── Schlafzimmer ───────────────────
  - id: sz_schlafzimmer_aus
    name: Schlafzimmer Aus
    entities:
      light.nachttisch:
        state: "off"

  - id: sz_schlafzimmer_chill
    name: Schlafzimmer Chill
    entities:
      light.nachttisch:
        state: "on"
        brightness_pct: *br_chill_accent
        hs_color: *hs_orange

  - id: sz_schlafzimmer_hell
    name: Schlafzimmer Hell
    entities:
      light.nachttisch:
        state: "on"
        brightness_pct: *br_hell_main
        color_temp: *ct_warmweiss


########################################
# SCRIPTS
########################################
script:
  # Global mode → sync per-room selectors + activate scenes
  apply_lighting_mode:
    alias: Lichtmodus anwenden
    mode: restart
    sequence:
      - service: input_select.select_option
        target:
          entity_id:
            - input_select.lighting_mode_wohnzimmer
            - input_select.lighting_mode_kueche
            - input_select.lighting_mode_schlafzimmer
            - input_select.lighting_mode_flur
        data:
          option: "{{ states('input_select.lighting_mode') }}"
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id:
                    - scene.wohnzimmer_hell
                    - scene.kuche_hell
                    - scene.flur_hell
                    - scene.schlafzimmer_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id:
                    - scene.wohnzimmer_chill
                    - scene.kuche_chill
                    - scene.flur_chill
                    - scene.schlafzimmer_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id:
                    - scene.wohnzimmer_aus
                    - scene.kuche_aus
                    - scene.flur_aus
                    - scene.schlafzimmer_aus


########################################
# AUTOMATIONS
########################################
automation:
  # Global mode changed → apply to all rooms
  - id: auto_lighting_mode_apply
    alias: Lichtmodus anwenden wenn geändert
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode
    action:
      - service: script.apply_lighting_mode
    mode: restart

  ########################################
  # Per-Room Lighting Mode Automations
  ########################################

  - id: auto_lighting_mode_wohnzimmer
    alias: Lichtmodus Wohnzimmer anwenden
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode_wohnzimmer
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_wohnzimmer
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.wohnzimmer_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_wohnzimmer
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.wohnzimmer_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_wohnzimmer
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.wohnzimmer_aus
    mode: restart

  - id: auto_lighting_mode_kueche
    alias: Lichtmodus Küche anwenden
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode_kueche
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_kueche
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.kuche_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_kueche
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.kuche_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_kueche
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.kuche_aus
    mode: restart

  - id: auto_lighting_mode_schlafzimmer
    alias: Lichtmodus Schlafzimmer anwenden
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode_schlafzimmer
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_schlafzimmer
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.schlafzimmer_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_schlafzimmer
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.schlafzimmer_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_schlafzimmer
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.schlafzimmer_aus
    mode: restart

  - id: auto_lighting_mode_flur
    alias: Lichtmodus Flur anwenden
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode_flur
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_flur
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.flur_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_flur
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.flur_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_flur
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.flur_aus
    mode: restart
