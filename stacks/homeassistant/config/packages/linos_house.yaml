###############################################################################
# LINOS / Wohnung – zentraler HomeAssistant Package
###############################################################################

########################################
# HELPERS (Dashboard-States)
########################################
input_select:
  house_mode:
    name: House Mode
    options:
      - home
      - away
      - sleep
    initial: home
    icon: mdi:home-account

  lighting_mode:
    name: Lichtmodus
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-multiple

  lighting_mode_wohnzimmer:
    name: Lichtmodus Wohnzimmer
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-group

  lighting_mode_kueche:
    name: Lichtmodus Küche
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-group

  lighting_mode_schlafzimmer:
    name: Lichtmodus Schlafzimmer
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-group

  lighting_mode_flur:
    name: Lichtmodus Flur
    options:
      - hell
      - chill
      - aus
    initial: chill
    icon: mdi:lightbulb-group

input_boolean:
  dog_is_home:
    name: Charlie zuhause
    icon: mdi:dog
  guest_mode:
    name: Besuch da
    icon: mdi:account-group
  quiet_mode:
    name: Quiet Mode
    icon: mdi:volume-off


########################################
# GROUPS (= deine "constants")
########################################
group:
  thermostats_all:
    name: Thermostate – alle
    entities:
      - climate.thermostat_wz
      - climate.thermostat_bad

  lights_wohnzimmer:
    name: Lichter – Wohnzimmer
    entities:
      - light.bidschirm
      - light.links
      - light.rechts
      - light.notenschlussel
      - light.klavier

  lights_flur:
    name: Lichter – Flur
    entities:
      - light.flur

  lights_kuche:
    name: Lichter – Küche
    entities:
      - light.kuche

  lights_schlafzimmer:
    name: Lichter – Schlafzimmer
    entities:
      - light.nachttisch

  lights_all:
    name: Lichter – Wohnung
    entities:
      - group.lights_wohnzimmer
      - group.lights_flur
      - group.lights_kuche
      - group.lights_schlafzimmer

  media_pause_on_mode_change:
    name: Media – pause on mode change
    entities:
      - media_player.arbeitszimmer

  media_off_on_away:
    name: Media – off on away
    entities:
      - media_player.fire_tv


########################################
# SCENES
########################################
# YAML-Anchors als Constants (beim ersten Vorkommen definiert):
#
#   Farben:
#     &ct_warmweiss 370        warm white (color_temp in mireds)
#     &hs_orange [30, 90]      bright orange (hs_color [hue, sat])
#
#   Helligkeit Chill:
#     &br_chill_accent 2       links, rechts, nachttisch
#     &br_chill_ambient 10     kuche, notenschlussel, flur
#     &br_chill_bildschirm 13  bildschirm
#
#   Helligkeit Hell:
#     &br_hell_main 60         links, rechts, nachttisch
#     &br_hell_bright 70       bildschirm, flur
#     &br_hell_accent 80       kuche, notenschlussel
########################################
scene:
  # ── Wohnzimmer ─────────────────────
  - id: sz_wohnzimmer_chill
    name: Wohnzimmer Chill
    entities:
      light.bidschirm:
        state: "on"
        brightness_pct: &br_chill_bildschirm 13
        color_temp: &ct_warmweiss 370
      light.links:
        state: "on"
        brightness_pct: &br_chill_accent 2
        hs_color: &hs_orange [30, 90]
      light.rechts:
        state: "on"
        brightness_pct: *br_chill_accent
        hs_color: *hs_orange
      light.notenschlussel:
        state: "on"
        brightness_pct: &br_chill_ambient 10
        color_temp: *ct_warmweiss

  - id: sz_wohnzimmer_hell
    name: Wohnzimmer Hell
    entities:
      light.bidschirm:
        state: "on"
        brightness_pct: &br_hell_bright 70
        color_temp: *ct_warmweiss
      light.links:
        state: "on"
        brightness_pct: &br_hell_main 60
        color_temp: *ct_warmweiss
      light.rechts:
        state: "on"
        brightness_pct: *br_hell_main
        color_temp: *ct_warmweiss
      light.notenschlussel:
        state: "on"
        brightness_pct: &br_hell_accent 80
        color_temp: *ct_warmweiss

  - id: sz_wohnzimmer_aus
    name: Wohnzimmer Aus
    entities:
      light.bidschirm:
        state: "off"
      light.links:
        state: "off"
      light.rechts:
        state: "off"
      light.notenschlussel:
        state: "off"

  # ── Küche ──────────────────────────
  - id: sz_kuche_aus
    name: Küche Aus
    entities:
      light.kuche:
        state: "off"

  - id: sz_kuche_chill
    name: Küche Chill
    entities:
      light.kuche:
        state: "on"
        brightness_pct: *br_chill_ambient
        color_temp: *ct_warmweiss

  - id: sz_kuche_hell
    name: Küche Hell
    entities:
      light.kuche:
        state: "on"
        brightness_pct: *br_hell_accent
        color_temp: *ct_warmweiss

  # ── Flur ───────────────────────────
  - id: sz_flur_aus
    name: Flur Aus
    entities:
      light.flur:
        state: "off"

  - id: sz_flur_chill
    name: Flur Chill
    entities:
      light.flur:
        state: "on"
        brightness_pct: *br_chill_ambient
        color_temp: *ct_warmweiss

  - id: sz_flur_hell
    name: Flur Hell
    entities:
      light.flur:
        state: "on"
        brightness_pct: *br_hell_bright
        color_temp: *ct_warmweiss

  # ── Schlafzimmer ───────────────────
  - id: sz_schlafzimmer_aus
    name: Schlafzimmer Aus
    entities:
      light.nachttisch:
        state: "off"

  - id: sz_schlafzimmer_chill
    name: Schlafzimmer Chill
    entities:
      light.nachttisch:
        state: "on"
        brightness_pct: *br_chill_accent
        hs_color: *hs_orange

  - id: sz_schlafzimmer_hell
    name: Schlafzimmer Hell
    entities:
      light.nachttisch:
        state: "on"
        brightness_pct: *br_hell_main
        color_temp: *ct_warmweiss

  # ── Wohnung (global) ──────────────
  - id: sz_wohnung_abwesend
    name: Wohnung Abwesend
    entities:
      group.lights_all:
        state: "off"

  - id: sz_wohnung_nacht
    name: Wohnung Nacht
    entities:
      group.lights_wohnzimmer:
        state: "off"
      group.lights_kuche:
        state: "off"
      group.lights_schlafzimmer:
        state: "on"
        brightness_pct: 10


########################################
# SCRIPTS (Router + Modus-Implementierung)
########################################
script:
  set_house_mode:
    alias: House Mode setzen
    mode: single
    fields:
      mode:
        description: home/away/sleep
        example: away
    sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.house_mode
        data:
          option: "{{ mode }}"

  set_lighting_mode:
    alias: Lichtmodus setzen
    mode: single
    fields:
      mode:
        description: hell/chill/aus
        example: chill
    sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.lighting_mode
        data:
          option: "{{ mode }}"

  # Lichtmodus -> passende Szenen + sync per-room selectors
  apply_lighting_mode:
    alias: Lichtmodus anwenden
    mode: restart
    sequence:
      # Sync per-room selectors to match global mode
      - service: input_select.select_option
        target:
          entity_id:
            - input_select.lighting_mode_wohnzimmer
            - input_select.lighting_mode_kueche
            - input_select.lighting_mode_schlafzimmer
            - input_select.lighting_mode_flur
        data:
          option: "{{ states('input_select.lighting_mode') }}"
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id:
                    - scene.wohnzimmer_hell
                    - scene.kuche_hell
                    - scene.flur_hell
                    - scene.schlafzimmer_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id:
                    - scene.wohnzimmer_chill
                    - scene.kuche_chill
                    - scene.flur_chill
                    - scene.schlafzimmer_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id:
                    - scene.wohnzimmer_aus
                    - scene.kuche_aus
                    - scene.flur_aus
                    - scene.schlafzimmer_aus

  wohnung_home:
    alias: Wohnung – Home
    mode: single
    sequence:
      - service: script.set_lighting_mode
        data:
          mode: "chill"
      - service: script.apply_lighting_mode
      - service: climate.set_temperature
        target:
          entity_id: group.thermostats_all
        data:
          temperature: 22
      - service: media_player.media_pause
        target:
          entity_id: group.media_pause_on_mode_change

  wohnung_away:
    alias: Wohnung – Away (mit Charlie/Besuch Logik)
    mode: single
    sequence:
      # Besuch da? Dann KEIN away-hardcut.
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.guest_mode
                state: "on"
            sequence:
              - stop: "Besuch ist da – Away wird nicht ausgeführt."

      # Basis: Licht aus + Temp runter + Media
      - service: scene.turn_on
        target:
          entity_id: scene.wohnung_abwesend
      - service: climate.set_temperature
        target:
          entity_id: group.thermostats_all
        data:
          temperature: 18
      - service: media_player.media_pause
        target:
          entity_id: group.media_pause_on_mode_change
      - service: media_player.turn_off
        target:
          entity_id: group.media_off_on_away

      # Charlie zuhause? Dann kleines "Charlie allein"-Profil (Flur dim + Temp 20)
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.dog_is_home
                state: "on"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: light.flur
                data:
                  brightness_pct: 10
                  color_temp: 380
              - service: climate.set_temperature
                target:
                  entity_id: group.thermostats_all
                data:
                  temperature: 20

      # Vacuum: nur tagsüber + nur wenn docked
      - choose:
          - conditions:
              - condition: time
                after: "09:00:00"
                before: "19:00:00"
              - condition: state
                entity_id: vacuum.s7_max_ultra
                state: docked
            sequence:
              - service: vacuum.start
                target:
                  entity_id: vacuum.s7_max_ultra

  wohnung_sleep:
    alias: Wohnung – Sleep
    mode: single
    sequence:
      - service: scene.turn_on
        target:
          entity_id: scene.wohnung_nacht
      - service: climate.set_temperature
        target:
          entity_id: group.thermostats_all
        data:
          temperature: 19
      - service: media_player.turn_off
        target:
          entity_id: media_player.fire_tv
      - service: vacuum.return_to_base
        target:
          entity_id: vacuum.s7_max_ultra

  wohnung_awake:
    alias: Wohnung – Awake (Morgenroutine)
    mode: single
    sequence:
      - service: script.set_house_mode
        data:
          mode: home
      - service: light.turn_on
        target:
          entity_id: light.nachttisch
        data:
          brightness_pct: 30
          hs_color: [25, 90]
      - service: climate.set_temperature
        target:
          entity_id: group.thermostats_all
        data:
          temperature: 22

  # Licht-Farbvoreinstellung auf ein bestimmtes Licht anwenden
  apply_light_color_preset:
    alias: Licht-Farbvoreinstellung anwenden
    mode: parallel
    max: 10
    fields:
      target_light:
        description: Entity-ID des Lichts
        example: light.bidschirm
      preset:
        description: "warmweiss / neutral / kaltweiss / orange / blau"
        example: warmweiss
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ preset == 'warmweiss' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ target_light }}"
                data:
                  color_temp: 370
          - conditions:
              - condition: template
                value_template: "{{ preset == 'neutral' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ target_light }}"
                data:
                  color_temp: 250
          - conditions:
              - condition: template
                value_template: "{{ preset == 'kaltweiss' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ target_light }}"
                data:
                  color_temp: 153
          - conditions:
              - condition: template
                value_template: "{{ preset == 'orange' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ target_light }}"
                data:
                  hs_color: [30, 90]
          - conditions:
              - condition: template
                value_template: "{{ preset == 'blau' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ target_light }}"
                data:
                  hs_color: [220, 60]

########################################
# AUTOMATIONS (Presence/Webhooks -> set mode, Router führt aus)
########################################
automation:
  # Router: wenn House Mode geändert wird -> passendes Script
  - id: auto_house_mode_router
    alias: House Mode Router
    trigger:
      - platform: state
        entity_id: input_select.house_mode
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.house_mode
                state: "home"
            sequence:
              - service: script.wohnung_home
          - conditions:
              - condition: state
                entity_id: input_select.house_mode
                state: "away"
            sequence:
              - service: script.wohnung_away
          - conditions:
              - condition: state
                entity_id: input_select.house_mode
                state: "sleep"
            sequence:
              - service: script.wohnung_sleep
    mode: restart

  

  # Sunset -> Chill (nur wenn wirklich "home")
  - id: auto_sunset_chill
    alias: Wohnung – Chill ab Sonnenuntergang
    trigger:
      - platform: sun
        event: sunset
        offset: "-00:20:00"
    condition:
      - condition: state
        entity_id: input_select.house_mode
        state: home
      - condition: state
        entity_id: device_tracker.linus_phone
        state: home
    action:
      - service: script.set_lighting_mode
        data:
          mode: chill
      - service: script.apply_lighting_mode
    mode: single

  # Handy verlässt Haus -> Away (nur wenn Besuch NICHT an)
  - id: auto_away_phone_leaves
    alias: Away-Mode – Handy verlässt Haus
    trigger:
      - platform: state
        entity_id: device_tracker.linus_phone
        from: home
        to: not_home
    condition:
      - condition: state
        entity_id: input_boolean.guest_mode
        state: "off"
    action:
      - service: script.set_house_mode
        data:
          mode: away
    mode: single

  # Ankunft -> Home + Flurlicht kurz bei Dunkelheit
  - id: auto_arrive_home
    alias: Ankunft – Modus Home + Licht bei Dunkelheit
    trigger:
      - platform: state
        entity_id: device_tracker.linus_phone
        from: not_home
        to: home
    action:
      - service: script.set_house_mode
        data:
          mode: home
      - choose:
          - conditions:
              - condition: sun
                after: sunset
            sequence:
              - service: light.turn_on
                target:
                  entity_id: light.flur
                data:
                  brightness_pct: 40
              - delay: "00:03:00"
              - service: light.turn_off
                target:
                  entity_id: light.flur
    mode: restart

  # Gute Nacht
  - id: auto_good_night
    alias: Gute Nacht – Wohnung runterfahren
    trigger:
      - platform: time
        at: "23:30:00"
    condition:
      - condition: state
        entity_id: device_tracker.linus_phone
        state: home
    action:
      - service: script.set_house_mode
        data:
          mode: sleep
    mode: single

  # Lichtmodus geändert -> anwenden (damit dein Dashboard-Toggle sofort wirkt)
  - id: auto_lighting_mode_apply
    alias: Lichtmodus anwenden wenn geändert
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode
    action:
      - service: script.apply_lighting_mode
    mode: restart

  # Webhooks -> setzen nur den Modus / rufen scripts
  - id: wh_wohnung_abwesend
    alias: Webhook – Wohnung Abwesend
    trigger:
      - platform: webhook
        webhook_id: linos_wohnung_abwesend
    action:
      - service: script.set_house_mode
        data:
          mode: away
    mode: single

  - id: wh_wohnung_chill
    alias: Webhook – Wohnung Chill
    trigger:
      - platform: webhook
        webhook_id: linos_wohnung_chill
    action:
      - service: script.set_lighting_mode
        data:
          mode: chill
      - service: script.apply_lighting_mode
    mode: single

  - id: wh_wohnung_hell
    alias: Webhook – Wohnung Hell
    trigger:
      - platform: webhook
        webhook_id: linos_wohnung_hell
    action:
      - service: script.set_lighting_mode
        data:
          mode: hell
      - service: script.apply_lighting_mode
    mode: single

  ########################################
  # Per-Room Lighting Mode Automations
  ########################################

  - id: auto_lighting_mode_wohnzimmer
    alias: Lichtmodus Wohnzimmer anwenden
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode_wohnzimmer
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_wohnzimmer
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.wohnzimmer_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_wohnzimmer
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.wohnzimmer_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_wohnzimmer
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.wohnzimmer_aus
    mode: restart

  - id: auto_lighting_mode_kueche
    alias: Lichtmodus Küche anwenden
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode_kueche
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_kueche
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.kuche_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_kueche
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.kuche_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_kueche
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.kuche_aus
    mode: restart

  - id: auto_lighting_mode_schlafzimmer
    alias: Lichtmodus Schlafzimmer anwenden
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode_schlafzimmer
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_schlafzimmer
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.schlafzimmer_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_schlafzimmer
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.schlafzimmer_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_schlafzimmer
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.schlafzimmer_aus
    mode: restart

  - id: auto_lighting_mode_flur
    alias: Lichtmodus Flur anwenden
    trigger:
      - platform: state
        entity_id: input_select.lighting_mode_flur
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_flur
                state: "hell"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.flur_hell
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_flur
                state: "chill"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.flur_chill
          - conditions:
              - condition: state
                entity_id: input_select.lighting_mode_flur
                state: "aus"
            sequence:
              - service: scene.turn_on
                target:
                  entity_id: scene.flur_aus
    mode: restart
