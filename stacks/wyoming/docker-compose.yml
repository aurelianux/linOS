services:
  whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: wyoming-whisper
    restart: unless-stopped
    ports:
      - "${WYOMING_WHISPER_PORT:-10300}:10300"
    environment:
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - whisper-data:/data
    command: --model base --language de
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/10300' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming-piper
    restart: unless-stopped
    ports:
      - "${WYOMING_PIPER_PORT:-10200}:10200"
    environment:
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - piper-data:/data
    command: --voice de_DE-thorsten-medium
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/10200' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  whisper-data:
  piper-data:
